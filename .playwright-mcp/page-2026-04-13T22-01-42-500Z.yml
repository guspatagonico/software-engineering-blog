      - heading "Dos conceptos formales que fundamentan la metáfora" [level=3] [ref=e58]
      - generic [ref=e59]:
        - generic [ref=e60]:
          - generic [ref=e61]: Barrier Functions (CBF)
          - text: No solo definís adónde querés llegar — definís regiones prohibidas con "paredes repulsivas". El agente recibe señal de que se está alejando
          - emphasis [ref=e62]: antes
          - text: "de romper algo. En el harness: los MCPs con paths restringidos son barrier functions estructurales, no instruccionales."
        - generic [ref=e63]:
          - generic [ref=e64]: Funciones de Lyapunov
          - text: "Una función que decrece monótonamente a lo largo de cualquier trayectoria del sistema prueba la convergencia. En harness: cada intervención del orquestador debe reducir la distancia al objetivo. Si no la reduce, el feedback loop está roto."
      - heading "Entropía vs. convergencia" [level=3] [ref=e65]
      - generic [ref=e66]:
        - generic [ref=e67]:
          - generic [ref=e68]: Entropía (harness roto)
          - text: Decisiones individualmente razonables que acumulan desviación. El context window se llena de ruido, las herramientas proliferan sin estructura, los sub-agentes optimizan localmente sin coherencia global.
        - generic [ref=e69]:
          - generic [ref=e70]: Convergencia (harness bien aplicado)
          - text: El espacio de acción está acotado, el feedback loop provee señal clara, las constraints son justas — ni tan laxas que generen entropía, ni tan rígidas que produzcan óptimos locales.
